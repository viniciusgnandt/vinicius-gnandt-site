server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Compressão
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Headers de segurança básicos
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Assets com hash do Next.js (imutáveis, 1 ano)
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Demais assets estáticos (1 ano, imutáveis)
    location ~* \.(?:jpg|jpeg|gif|png|webp|svg|ico|css|js|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    # robots / sitemap (sem cache agressivo)
    location ~* /(robots\.txt|sitemap\.xml)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # Página principal sem cache (sempre fresca)
    location = / {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Esconder versão do nginx
    server_tokens off;

    # Bloquear arquivos sensíveis
    location ~ /\.(?!well-known) {
        deny all;
    }

    # 404 do Next.js
    error_page 404 /404.html;
}
