services:
  web:
    # Imagem pronta, publicada automaticamente pelo GitHub Actions a cada push
    # em main (.github/workflows/docker-publish.yml). O servidor só baixa —
    # nunca compila. Para buildar localmente (dev/teste), use:
    # docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
    image: ghcr.io/viniciusgnandt/vinicius-gnandt-site:${IMAGE_TAG:-latest}
    container_name: viniciusgnandt-site
    restart: always
    expose:
      - "80"
    # Para acesso direto sem reverse proxy, descomente:
    # ports:
    #   - "${HOST_PORT:-80}:80"
    networks:
      - web
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "com.viniciusgnandt.service=landing-page"
      - "com.viniciusgnandt.environment=production"

networks:
  web:
    driver: bridge
